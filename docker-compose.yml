version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# AI Credit Card Decisioning POC — Infrastructure Services
#
# Starts: Zookeeper, Kafka, Kafka UI, Qdrant
# Does NOT start: Spring Boot API or Python Orchestrator (run those manually)
#
# Usage:
#   docker-compose up -d          start all services
#   docker-compose down           stop all services
#   docker-compose ps             check status
#   docker-compose logs kafka     view kafka logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: poc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: poc-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT = accessible from host (localhost:9092)
      # PLAINTEXT_INTERNAL = inter-container communication
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://poc-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # keep messages 7 days
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: poc-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-poc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: poc-kafka:29092
    networks:
      - poc-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: poc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"    # gRPC port (optional)
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  poc-network:
    driver: bridge

volumes:
  qdrant_storage:
    driver: local
server:
  port: 8080

spring:
  application:
    name: decision-api

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Kafka topic names (overridable via env)
kafka:
  topics:
    application-received: application.received

# Actuator — expose health + prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging — JSON format defined in logback-spring.xml (auto-detected by Spring Boot).
# Levels here are the runtime-overridable defaults; logback-spring.xml also sets them
# as fallback but application.yml takes precedence when both are present.
logging:
  config: classpath:logback-spring.xml
  level:
    com.citi.creditdecision: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN

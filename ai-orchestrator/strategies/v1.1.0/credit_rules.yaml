version: "1.1.0"

# Challenger: hard-decline threshold raised from 580 → 600.
# Hypothesis: fewer false DECLINE decisions for near-prime applicants.
prompt_context:
  score_decline: 600
  score_fair_max: 669
  score_good_min: 670
  score_very_good_min: 740
  util_high: 80
  util_medium: 50
  delinq_high: 3
  delinq_medium: 1

rules:
  - name: auto_decline_low_score
    condition: "credit_score < {threshold}"
    threshold: 600
    action: DECLINE
    ecoa_code: AA01
    priority: 1

  - name: auto_decline_high_utilization
    condition: "utilization > {util_threshold}"
    util_threshold: 80
    action: DECLINE
    ecoa_code: AA04
    priority: 1

  - name: auto_decline_high_delinquencies
    condition: "delinquencies >= {delinq_threshold}"
    delinq_threshold: 3
    action: DECLINE
    ecoa_code: AA09
    priority: 1

  - name: manual_review_fair_score
    condition: "credit_score >= {fair_min} and credit_score < {good_min}"
    fair_min: 600
    good_min: 670
    action: MANUAL_REVIEW
    priority: 2

  - name: manual_review_high_util_address
    condition: "utilization > {util_threshold} and address_mismatch == true"
    util_threshold: 80
    action: MANUAL_REVIEW
    ecoa_codes: [AA04, AA07]
    priority: 2

  - name: medium_utilization
    condition: "utilization > {medium_threshold}"
    medium_threshold: 50
    action: MANUAL_REVIEW
    ecoa_code: AA04
    priority: 3

  - name: medium_delinquencies
    condition: "delinquencies >= {min_delinq}"
    min_delinq: 1
    action: MANUAL_REVIEW
    ecoa_code: AA09
    priority: 3

  - name: approve_excellent_profile
    condition: "credit_score >= {good_min} and utilization < {util_medium} and delinquencies == 0"
    good_min: 670
    util_medium: 50
    action: APPROVE
    priority: 10
